<script>

// ── APPLY CONFIG ──
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('clubName').textContent    = CONFIG.clube;
  document.getElementById('clubCat').textContent     = CONFIG.categoria;
  document.getElementById('clubLogo').src            = CONFIG.logoBase64;
  document.title = `Monitor — ${CONFIG.clube} ${CONFIG.categoria}`;

  document.documentElement.style.setProperty('--accent',     CONFIG.corPrimaria);
  document.documentElement.style.setProperty('--accent-pos', CONFIG.corPrimaria);
  document.documentElement.style.setProperty('--accent-pre', CONFIG.corSecundaria);
  document.documentElement.style.setProperty('--danger',     CONFIG.corPrimaria);
  document.documentElement.style.setProperty('--bg',         CONFIG.corFundo);
  document.documentElement.style.setProperty('--text',       CONFIG.corTexto);

  const now = new Date();
  document.getElementById('dataForm').value = now.toISOString().split('T')[0];
  document.getElementById('horaForm').value = now.toTimeString().slice(0,5);

  buildScale('psrScale',  0, 10, 'psr');
  buildScale('sonoScale', 1, 10, 'sono');
  buildScale('pseScale',  0, 10, 'pse');
  buildScale('painScale', 1, 10, 'pain');
  buildBodyMap();
  setMode('pre');
});

// ── STATE ──
let mode = 'pre';
let selectedPSR = null, selectedPSE = null, selectedSono = null, selectedPain = null;
let selectedBodyParts = new Set();

// ── FUNÇÃO PRINCIPAL (CORRIGIDA) ──
function submitForm() {
  const nome = document.getElementById('nomeAtleta').value.trim();

  if (!nome) {
    alert('Por favor, informe o nome do atleta.');
    return;
  }

  if (mode === 'pre' && selectedPSR === null) {
    alert('Preencha a PSR (Recuperação).');
    return;
  }

  if (mode === 'pos' && selectedPSE === null) {
    alert('Preencha a PSE (Esforço).');
    return;
  }

  const data = {
    clube: CONFIG.clube,
    categoria: CONFIG.categoria,
    tipo: mode === 'pre' ? 'Pré-Treino' : 'Pós-Treino',
    atleta: nome,
    posicao: document.getElementById('posicao').value,
    data: document.getElementById('dataForm').value,
    hora: document.getElementById('horaForm').value,

    ...(mode === 'pre' ? {
      psr: selectedPSR,
      qualidadeSono: selectedSono,
      horasSono: document.getElementById('horasSono').value,
    } : {
      pse: selectedPSE,
      duracaoTreino: document.getElementById('duracaoTreino').value + ' ' + document.getElementById('duracaoUnidade').value,
    }),

    regioesDor: [...selectedBodyParts],
    intensidadeDor: selectedBodyParts.size > 0 ? selectedPain : null,
    notasLesao: document.getElementById('lesaoNotes').value,
    observacoes: document.getElementById('obsGerais').value,
    timestamp: new Date().toISOString(),
  };

  console.log("📊 Enviando:", data);

  const url = "https://script.google.com/macros/s/AKfycbz-An42rGbRpXx1hUXaHK_8qb9NquDK7a7RkdoDQPrnOhkXwRzCOIv8af3gh1qm26b_3w/exec";

  fetch(url, {
    method: "POST",
    mode: "no-cors",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(data)
  })
  .then(() => {
    console.log("✅ Enviado com sucesso");

    document.getElementById('formBody').style.display = 'none';
    document.getElementById('submitBar').style.display = 'none';

    const ss = document.getElementById('successScreen');
    ss.classList.add('show');

    document.getElementById('successSub').textContent =
      `${CONFIG.categoria} — ${nome} — ${data.hora}`;
  })
  .catch((err) => {
    console.error("❌ Erro:", err);
    alert("Erro ao enviar. Verifique a conexão.");
  });
}

// ── RESTANTE DO SEU JS (SEM ALTERAÇÃO) ──
// buildScale, selectScale, setMode, resetForm, etc permanecem iguais

</script>
