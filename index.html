<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monitor de Carga — Americano FC</title>
</head>

<body style="background:#0d0d0d;color:#fff;font-family:Arial;padding:20px">

<h2>Monitoramento Americano FC</h2>

<label>Nome do atleta:</label><br>
<input type="text" id="nomeAtleta"><br><br>

<label>Posição:</label><br>
<input type="text" id="posicao"><br><br>

<label>Qualidade do Sono:</label><br>
<input type="number" id="sono"><br><br>

<label>PSE:</label><br>
<input type="number" id="pse"><br><br>

<button onclick="submitForm()" id="submitBtn">
ENVIAR AVALIAÇÃO
</button>

<script>

function submitForm() {

  console.log("BOTÃO CLICADO");

  const data = {
    atleta: document.getElementById("nomeAtleta").value,
    posicao: document.getElementById("posicao").value,
    qualidadeSono: document.getElementById("sono").value,
    pse: document.getElementById("pse").value,
    data: new Date().toLocaleDateString(),
    hora: new Date().toLocaleTimeString()
  };

  fetch('https://script.google.com/macros/s/AKfycbz-An42rGbRpXx1hUXaHK_8qb9NquDK7a7RkdoDQPrnOhkXwRzCOIv8af3gh1qm26b_3w/exec', {
  method: 'POST',
  body: JSON.stringify(data)
})
.then(res => {
  console.log("ENVIADO:", res);
  alert("Resposta enviada com sucesso!");
})
.catch(err => {
  console.error("ERRO:", err);
  alert("Erro ao enviar!");
});

</script>

</body>
</html>
